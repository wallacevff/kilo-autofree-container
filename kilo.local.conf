server {
    listen 80;
    server_name kilocode.local;

    # 🔁 Redireciona tudo pra HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name kilocode.local;

    # 🔐 Certificados
    ssl_certificate     /etc/nginx/certs/kilocode.local.crt;
    ssl_certificate_key /etc/nginx/certs/kilocode.local.key;

    # 🔒 Boas práticas SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        proxy_pass http://kilo-autofree_kilo:4096;

        # 🔥 Headers padrão
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # 🔥 WebSocket (ESSENCIAL)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 🔥 Conexões longas (agentes)
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;

        # 🔥 Streaming / realtime
        proxy_buffering off;
    }
}