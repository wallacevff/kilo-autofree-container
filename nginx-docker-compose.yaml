version: "3.9"

services:
  nginx:
    image: nginx:alpine

    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: ingress
      - target: 443
        published: 443
        protocol: tcp
        mode: ingress

    volumes:
      - nginx_config:/etc/nginx:ro

    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

    networks:
      - kilo_net

networks:
  kilo_net:
    external: true


volumes:
  nginx_config:
    external: true
